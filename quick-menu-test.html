<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quick Menu Test</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background: #f5f5f5; }
        .container { max-width: 1200px; margin: 0 auto; }
        .menu-item { 
            border: 2px solid #3498db; 
            padding: 20px; 
            margin: 15px 0; 
            background: white;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .menu-item h3 { margin: 0 0 10px 0; color: #2c3e50; font-size: 24px; }
        .menu-item p { margin: 5px 0; color: #7f8c8d; }
        .price { font-weight: bold; color: #e74c3c; font-size: 20px; }
        .btn { 
            background: #3498db; 
            color: white; 
            padding: 10px 20px; 
            border: none; 
            border-radius: 5px; 
            cursor: pointer;
            margin: 5px;
            font-size: 16px;
        }
        .btn:hover { background: #2980b9; }
        .btn-success { background: #27ae60; }
        .btn-success:hover { background: #229954; }
        .loading { color: #3498db; font-style: italic; font-size: 18px; }
        .error { color: #e74c3c; font-size: 18px; }
        .success { color: #27ae60; font-size: 18px; }
        .header { text-align: center; margin-bottom: 30px; }
        .status { text-align: center; margin: 20px 0; padding: 15px; background: white; border-radius: 8px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🍽️ Quick Menu Test</h1>
            <p>Testing menu loading and display functionality</p>
        </div>
        
        <div class="status" id="status">
            <div class="loading">🔄 Loading menu items...</div>
        </div>
        
        <div id="menuContainer"></div>
        
        <div style="text-align: center; margin: 30px 0;">
            <button onclick="loadMenu()" class="btn">🔄 Reload Menu</button>
            <button onclick="testAPI()" class="btn">🔍 Test API</button>
        </div>
    </div>
    
    <script>
        let menuItems = [];
        
        async function testAPI() {
            const status = document.getElementById('status');
            status.innerHTML = '<div class="loading">🔍 Testing API connection...</div>';
            
            try {
                const response = await fetch('http://localhost:3000/api/menu');
                const data = await response.json();
                
                if (data.success && data.menuItems) {
                    status.innerHTML = `<div class="success">✅ API Working! Found ${data.menuItems.length} menu items</div>`;
                    console.log('API Test Success:', data);
                } else {
                    status.innerHTML = '<div class="error">❌ API returned no data</div>';
                }
            } catch (error) {
                status.innerHTML = `<div class="error">❌ API Error: ${error.message}</div>`;
                console.error('API Test Error:', error);
            }
        }
        
        async function loadMenu() {
            const status = document.getElementById('status');
            const container = document.getElementById('menuContainer');
            
            status.innerHTML = '<div class="loading">🔄 Loading menu items...</div>';
            container.innerHTML = '';
            
            try {
                console.log('Loading menu...');
                const response = await fetch('http://localhost:3000/api/menu');
                console.log('Response status:', response.status);
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const data = await response.json();
                console.log('API response:', data);
                
                if (data.success && data.menuItems && data.menuItems.length > 0) {
                    menuItems = data.menuItems;
                    status.innerHTML = `<div class="success">✅ Successfully loaded ${menuItems.length} menu items</div>`;
                    
                    displayMenuItems(menuItems);
                } else {
                    throw new Error('No menu items received from server');
                }
            } catch (error) {
                console.error('Error:', error);
                status.innerHTML = `<div class="error">❌ Error: ${error.message}</div>`;
                container.innerHTML = '';
            }
        }
        
        function displayMenuItems(items) {
            const container = document.getElementById('menuContainer');
            let html = '';
            
            items.forEach((item, index) => {
                html += `
                    <div class="menu-item">
                        <h3>${index + 1}. ${item.name}</h3>
                        <p><strong>ID:</strong> ${item.id}</p>
                        <p><strong>Category:</strong> ${item.category_name || 'Unknown'}</p>
                        <p><strong>Description:</strong> ${item.description}</p>
                        <p class="price">Price: $${item.price}</p>
                        <button class="btn" onclick="orderItem('${item.name}', ${item.price})">
                            🛒 Order Now
                        </button>
                        <button class="btn btn-success" onclick="addToCart('${item.name}', ${item.price})">
                            ➕ Add to Cart
                        </button>
                    </div>
                `;
            });
            
            container.innerHTML = html;
            console.log(`Displayed ${items.length} menu items`);
        }
        
        function orderItem(name, price) {
            alert(`Order placed for ${name} - $${price}\n\nThis would normally open the order form.`);
        }
        
        function addToCart(name, price) {
            alert(`${name} added to cart - $${price}\n\nThis would add the item to your shopping cart.`);
        }
        
        // Auto-load on page load
        window.addEventListener('load', () => {
            console.log('Page loaded, starting menu test...');
            loadMenu();
        });
    </script>
</body>
</html>
